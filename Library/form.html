<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <section id="input-section">
        <h2>Add book</h2>
   <form id="bookForm">
  <div class="mb-3" id="input-section">
    <label for="book-title" class="form-label">Title</label>
    <input type="text" class="form-control" id="book-title" aria-describedby="emailHelp" required>
  </div>
  <div class="mb-3">
    <label for="Book-author" class="form-label">Author</label>
    <input type="text" class="form-control" id="Book-author">
  </div>
  <div class="mb-3 ">
     <label class="form-label" for="book-pages">pages</label>
    <input type="text" class="form-control" id="book-pages">
  </div>
  <div class="mb-3 ">
     <label class="form-label" for="level-interest">Rate-interest</label>
    <input type="text" class="form-control" id="level-interest">
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
      </section>
      <hr>

<!-- 2. The Output Section (Display) -->
<section id="library-section">
  <h2>My Collection</h2>
  <div id="book-container">
    <!-- JS will inject the book-cards here -->
  </div>
</section>
</body>
<script src="Library.js"></script>
</html>
